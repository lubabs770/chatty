name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v1.0.1)'
        required: true

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-14            # Apple Silicon runner with full Xcode (xcbuild)
    steps:
      - uses: actions/checkout@v4

      - name: Show toolchain
        run: swift --version

      - name: Build universal app bundle
        run: |
          chmod +x make-app.sh
          UNIVERSAL=1 ./make-app.sh release

      - name: Verify universal binary
        run: |
          lipo -archs Chatty.app/Contents/MacOS/Chatty
          lipo -archs Chatty.app/Contents/MacOS/Chatty | grep -q 'arm64' \
            && lipo -archs Chatty.app/Contents/MacOS/Chatty | grep -q 'x86_64'

      - name: Package
        run: ditto -c -k --keepParent Chatty.app Chatty.app.zip

      - name: Resolve tag
        id: tag
        run: echo "name=${{ github.event.inputs.tag || github.ref_name }}" >> "$GITHUB_OUTPUT"

      - name: Create / update release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.tag.outputs.name }}
        run: |
          NOTES="Universal (arm64 + x86_64) build of Chatty.

          **Install**
          \`\`\`sh
          /bin/bash -c \"\$(curl -fsSL https://raw.githubusercontent.com/lubabs770/chatty/main/install.sh)\"
          \`\`\`
          Requires macOS 13+ and an installed, authenticated \`claude\` CLI. The app is unsigned; the installer removes the Gatekeeper quarantine for you."
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" Chatty.app.zip --clobber
          else
            gh release create "$TAG" Chatty.app.zip --title "Chatty $TAG" --notes "$NOTES"
          fi
